version: 1.0.0
homepage: https://github.com/Chanomhub/chanomhub-sdk-dart
repository: https://github.com/Chanomhub/chanomhub-sdk-dart
issue_tracker: https://github.com/Chanomhub/chanomhub-sdk-dart/issues

environment:
  sdk: ^3.11.0
  flutter: ">=1.17.0"

dependencies:
  dio: ^5.9.1
  flutter:
    sdk: flutter
  json_annotation: ^4.11.0

dev_dependencies:
